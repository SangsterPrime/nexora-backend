spring.datasource.url=jdbc:h2:mem:nexora_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

frontend.url=http://localhost:5173

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ── Integración n8n (desactivada en tests) ───────────────────────────────────
nexora.integrations.n8n.enabled=false
nexora.integrations.n8n.webhook-url=
nexora.integrations.n8n.secret=
