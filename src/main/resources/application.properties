spring.config.import=optional:file:.env[.properties]

spring.application.name=nexora-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.forward-headers-strategy=framework

spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# ── Integración n8n ──────────────────────────────────────────────────────────
nexora.integrations.n8n.enabled=${N8N_ENABLED:false}
nexora.integrations.n8n.webhook-url=${N8N_WEBHOOK_URL:}
nexora.integrations.n8n.secret=${N8N_WEBHOOK_SECRET:}

# ── Integración servicio ML/IA (EntrenamientoAI) ──────────────────────────────
nexora.integrations.ml.enabled=${NEXORA_ML_ENABLED:false}
nexora.integrations.ml.url=${NEXORA_ML_URL:}
nexora.integrations.ml.api-key=${NEXORA_ML_API_KEY:}
